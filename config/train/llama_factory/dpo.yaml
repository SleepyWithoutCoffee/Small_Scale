### model
model_name_or_path: /path/to/model/DeepSeek-R1-Distill-Qwen-1.5B
trust_remote_code: true

### method
stage: dpo
do_train: true
pref_beta: 0.1
pref_loss: lcpo
finetuning_type: full
deepspeed: /path/to/config/train/deepspeed_z3.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: limr_stage_1_preference_1_5B
template: deepseek3
cutoff_len: 2300
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /path/to/model/lcpo_test_1.5B
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 5.0e-6
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null